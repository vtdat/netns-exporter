api_server:
  server_address: 0.0.0.0
  server_port: 9101
  request_timeout: 600
  telemetry_path: /metrics

# Statistics files from the directory
# /sys/devices/virtual/net/<device>/statistics/
# must be taken into account
interface_metrics: 
  - "rx_bytes"
  - "rx_packets"
  - "rx_dropped"
  - "rx_errors"      # Added: General Health
  - "tx_bytes"
  - "tx_packets"
  - "tx_dropped"     # Added: Outbound Congestion
  - "tx_errors"      # Added: General Health

# (Optional) Filter namespaces by regular expression
# With the simultaneous use of two filters, the blacklist has a higher priority
namespaces_filter:
#   blacklist_pattern: "regexp_pattern1"
#   whitelist_pattern: "^qrouter-\\d$"
# device_filter:
#   blacklist_pattern: regexp_pattern1
#   whitelist_pattern: regexp_pattern2
internal_cidrs:
  - "10.0.0.0/9"

destination_host: 1.1.1.1
scrape_interval: 60
log_directory: /var/log/netns-exporter
